spring.application.name=deploy-diff-notifier

# --- Database (H2 in-memory) ---
spring.datasource.url=jdbc:h2:mem:deployments;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- H2 web console (http://localhost:8080/h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# --- Slack notification ---
# Set your Slack Incoming Webhook URL (or a webhook.site URL for testing).
# Leave empty to disable notifications (the service will no-op).
slack.webhook-url=
